name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend — линтер и тесты
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Установить зависимости
        run: pip install -r requirements.txt

      - name: Линтер (flake8)
        run: |
          pip install flake8
          flake8 app --max-line-length=120 --extend-ignore=E203,W503

      - name: Тесты с покрытием
        env:
          SECRET_KEY: ci-test-secret-key
          DATABASE_URL: sqlite:///./test_ci.db
        run: pytest tests/ -v --cov=app --cov-report=term-missing

  frontend:
    name: Frontend — линтер
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Установить Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Установить зависимости
        run: npm ci

      - name: Линтер (eslint)
        run: npm run lint

      - name: Проверить, что фронтенд собирается
        run: npm run build

  build-images:
    name: Сборка Docker-образов
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout репозитория
        uses: actions/checkout@v4

      - name: Собрать образ backend
        run: docker build -t kbs-backend:${{ github.sha }} ./backend

      - name: Собрать образ frontend
        run: docker build -t kbs-frontend:${{ github.sha }} ./frontend --build-arg VITE_API_URL=http://localhost:8000