server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Все маршруты отдаём на index.html, чтобы работал React Router
    # (иначе прямой заход на /search вернёт 404 от Nginx, а не от React)
    location / {
        try_files $uri /index.html;
    }

    # Статичные ассеты с хэшем в имени можно кешировать надолго
    location /assets/ {
        expires 1y;
        access_log off;
        add_header Cache-Control "public, immutable";
    }
}